# Trader Live Configuration

# Core system mode: live, paper, backtest
mode: live

# Enabled data adapters and accounts
adapters:
  # market:
  #   - source: polygon
  #     symbols: ["AAPL", "MSFT", "NVDA", "BTC-USD"]
  #     timeframe: "1m"
  #   - source: alpaca
  #     name: stock
  #     symbols: ["SPY", "QQQ"]
  #     timeframe: "1m"
  # news:
  #   - source: benzinga
  #     categories: ["mergers", "earnings"]
  #   - source: rss
  #     urls:
  #       - "https://feeds.finance.yahoo.com/rss/2.0/headline?s=AAPL"
  account:
    - source: alpaca
      paper: true

  market:
    - source: alpaca
      name: stock
      feed: iex
    - source: alpaca
      name: option

# Active features to compute
# features:
# technical:
#   - source: rsi
#     period: 14
#   - source: returns
#     lags: [1, 5]
# crosssectional:
#   - source: rank
#     metric: returns_1
# sentiment:
#   - source: sentiment
#     model: "finiteautomata/bertweet-base-sentiment-analysis"

# Risk controls and limits
guardrails:
  max_drawdown_percent: 5.0
  max_position_size_dollars: 50000.0
  max_order_size_dollars: 10000.0
  kill_switch_enabled: true

# Agent settings
agent:
  strategy: trend_following_agent
  react_loop_interval_seconds: 5.0

# Non-adapter infrastructure (event bus, persistence, ...). `bus.url` is
# intentionally left blank here so the live profile doesn't accidentally
# point at a developer-local Redis — set it (via env substitution or a
# real config layer) to your production Redis endpoint before running
# `just live`. The `stream` and `maxlen` defaults are fine to keep on.
infra:
  bus:
    # url: redis://your-prod-redis:6379/0
    stream: trader:events
    maxlen: 100000

  persistence:
    # Operators must opt in and provide a production database DSN in deployment-specific configs.
    dsn: ""
    enabled: false
