# Trader Live Configuration

# Core system mode: live, paper, backtest
mode: smoke

# Enabled data adapters and accounts
adapters:
  account:
    - name: alpaca
      paper: true

# Risk controls and limits
guardrails:
  max_drawdown_percent: 5.0
  max_position_size_dollars: 50000.0
  max_order_size_dollars: 10000.0
  kill_switch_enabled: true

infra:
  bus:
    # Uncomment to drive the smoke through RedisStreamBus (requires `just up`
    # to be running). Default InProcessBus is the offline-friendly choice and
    # is what the smoke relies on for the persistence round-trip demo.
    # url: redis://localhost:6379/0
    stream: trader:events
    maxlen: 100000
  persistence:
    dsn: sqlite+aiosqlite:///./smoke.db
    enabled: true
